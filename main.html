<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quiz Miner</title>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#111; }
    
    #game-app {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      background: radial-gradient(circle at bottom, #2c3e50, #0a0a0a);
      font-family: 'Montserrat', sans-serif;
      user-select: none;
      position: relative;
    }

    .ui-layer {
      position: absolute; top: 0; left: 0; width: 100%;
      padding: 15px 30px; box-sizing: border-box;
      pointer-events: none; z-index: 10;
      color: white; text-align: center;
    }

    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }

    .progress-box {
      width: 40%; height: 16px; background: rgba(0,0,0,0.5);
      border-radius: 8px; border: 2px solid #fff; overflow: hidden;
    }
    .progress-fill { width: 0%; height: 100%; background: #00ffcc; transition: width 0.3s; box-shadow: 0 0 10px #00ffcc;}
    
    .score-box { 
      font-size: 3.5vmin; font-family: 'Fredoka One', cursive; text-shadow: 2px 2px 0 rgba(0,0,0,0.5); 
      display:flex; flex-direction: column; align-items: flex-end;
    }
    .combo-badge { font-size: 2.5vmin; color: #f1c40f; }

    .question-box {
      background: rgba(255, 255, 255, 0.95);
      color: #111; padding: 15px 30px; border-radius: 20px;
      font-size: 4.5vmin; font-weight: bold; display: inline-block;
      box-shadow: 0 8px 15px rgba(0,0,0,0.3); max-width: 80%;
      margin-top: 10px; transition: background 0.3s;
    }

    canvas { display: block; width: 100%; height: 100%; }

    .overlay {
      position: absolute; inset: 0; z-index: 100; background: rgba(10, 10, 10, 0.95);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: white; text-align: center;
    }
    h1 { font-family: 'Fredoka One', cursive; font-size: 10vmin; margin: 0; text-shadow: 0 0 15px rgba(0,255,204,0.5); }
    .btn {
      background: #00ffcc; color: #111; font-size: 5vmin; padding: 15px 50px;
      border-radius: 40px; border: none; border-bottom: 8px solid #00b38f;
      cursor: pointer; font-family: 'Fredoka One', cursive; margin-top: 30px; pointer-events: auto;
      transition: transform 0.1s;
    }
    .btn:active { transform: translateY(4px); border-bottom-width: 4px; }
    
    .floating-text {
      position: absolute; font-family: 'Fredoka One', cursive;
      font-size: 4vmin; color: #00ffcc; text-shadow: 0 0 10px #00ffcc;
      pointer-events: none; z-index: 50; animation: floatUp 1s ease-out forwards;
    }
    @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-80px) scale(1.5); opacity: 0; } }
  </style>
</head>
<body>

<div id="game-app">
  <div class="ui-layer" id="ui-layer" style="display:none;">
    <div class="top-bar">
      <div class="progress-box"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="score-box">
        <div>Очки: <span id="score-display">0</span></div>
        <div class="combo-badge">Комбо: x<span id="combo-display">1.0</span></div>
      </div>
    </div>
    <div class="question-box" id="question-text">Загрузка...</div>
  </div>

  <canvas id="gameCanvas"></canvas>
  <div id="floaty-container"></div>

  <div id="start-screen" class="overlay">
    <h1 id="uiTitle">QUIZ MINER</h1>
    <div id="cfgNote" style="margin-top:10px; opacity:0.8;"></div>
    <button class="btn" id="btnStart">СТАРТ</button>
  </div>

  <div id="end-screen" class="overlay" style="display:none;">
    <h1 style="font-size: 15vmin; text-shadow:none;" id="end-emoji">🏆</h1>
    <h1 id="end-title">ВЫ ИГРАЛИ ВЕЛИКОЛЕПНО!</h1>
    <p style="font-size: 6vmin; font-weight: bold; color:#00ffcc;" id="end-score">Счёт: 0</p>
    <button class="btn" id="btnAgain">ЕЩЁ РАЗ</button>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(location.search);
  const cfgId = urlParams.get('id');
  const previewMode = urlParams.get('preview') === '1';

  const JSON_BASES = ["https://nikashum93.github.io/texts/data/", "https://nikashum93.github.io/data/"];

  let CFG = {
    ui: { title: "QUIZ MINER", start: "СТАРТ", again: "ЕЩЁ РАЗ", win: "КВИЗ ПРОЙДЕН!" },
    visual: { 
      hero: "🧙‍♂️", hook: "⚓", target: "", 
      ropeColor: "#bdc3c7", qBoxColor: "#ffffff",
      heroSize: 120, heroYOffset: 80, hookSize: 50, hookOffsetY: 0
    },
    gameplay: { hookSpeed: 9, swingSpeed: 0.035 }, 
    tasks: [] 
  };

  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'MINER_CFG') {
      CFG = Object.assign({}, CFG, e.data.cfg);
      applyUI();
      if(Game.state === 'idle') Game.reset();
    }
  });

  async function loadConfig() {
    if (previewMode) return;
    if (!cfgId) return;
    try {
      let res = null;
      for (const base of JSON_BASES) {
        try { res = await fetch(`${base}${encodeURIComponent(cfgId)}.json?v=${Date.now()}`); if (res.ok) break; } catch(e){}
      }
      if (res && res.ok) {
        CFG = Object.assign({}, CFG, await res.json());
      }
    } catch (e) { document.getElementById('cfgNote').textContent = '⚠️ Конфиг не найден'; }
  }

  function applyUI() {
    document.getElementById('uiTitle').textContent = CFG.ui.title || "QUIZ MINER";
    document.getElementById('btnStart').textContent = CFG.ui.start || "СТАРТ";
    document.getElementById('btnAgain').textContent = CFG.ui.again || "ЕЩЁ РАЗ";
    const qb = document.getElementById('question-text');
    qb.style.background = CFG.visual.qBoxColor;
    
    const hex = CFG.visual.qBoxColor.replace('#', '');
    if(hex.length === 6) {
        const r = parseInt(hex.substr(0, 2), 16), g = parseInt(hex.substr(2, 2), 16), b = parseInt(hex.substr(4, 2), 16);
        const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
        qb.style.color = (yiq >= 128) ? '#111' : '#fff';
    }
  }

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  const imgCache = {};
  function renderEntity(val, x, y, defaultSize, isTarget = false, targetW = 0, targetH = 0) {
    if (!val) return false;
    if (val.startsWith('http') || val.endsWith('.png') || val.endsWith('.jpg') || val.endsWith('.gif') || val.startsWith('data:image')) {
      if (!imgCache[val]) {
        const img = new Image(); img.src = val; imgCache[val] = img;
      }
      if (imgCache[val].complete && imgCache[val].naturalWidth > 0) {
        const w = isTarget ? targetW : defaultSize;
        const h = isTarget ? targetH : defaultSize;
        ctx.drawImage(imgCache[val], x - w/2, y - h/2, w, h);
        return true; 
      }
    } else {
      ctx.font = `${defaultSize}px Arial`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(val, x, y);
      return false; 
    }
  }

  // Отрисовка цепи
  function drawChain(x1, y1, x2, y2, color) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const angle = Math.atan2(dy, dx);
    const linkLength = 15;
    const numLinks = Math.max(1, Math.floor(dist / linkLength));

    ctx.save();
    ctx.translate(x1, y1);
    ctx.rotate(angle);
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;

    for (let i = 0; i < numLinks; i++) {
      ctx.beginPath();
      // Рисуем звено как вытянутый овал
      ctx.ellipse(i * linkLength + linkLength/2, 0, linkLength/2, 4, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }

  const Game = {
    state: 'idle',
    hookState: 'swinging',
    score: 0,
    combo: 1.0,
    currentTaskIndex: 0,
    targets: [],
    hook: { x: 0, y: 0, angle: 0, length: 60, maxLength: 1000, time: 0, caughtTarget: null },

    reset() {
      this.score = 0; this.combo = 1.0; this.currentTaskIndex = 0;
      this.state = 'idle'; this.hookState = 'swinging'; this.hook.length = 60; this.targets = [];
      document.getElementById('start-screen').style.display = 'flex';
      document.getElementById('ui-layer').style.display = 'none';
      document.getElementById('end-screen').style.display = 'none';
      this.draw();
    },

    start() {
      if(!CFG.tasks || CFG.tasks.length === 0) return alert("Нет заданий!");
      this.score = 0; this.combo = 1.0; this.currentTaskIndex = 0;
      this.state = 'playing';
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('ui-layer').style.display = 'block';
      this.loadTask();
      this.loop();
    },

    spawnFloaty(text, x, y, color) {
      const fc = document.getElementById('floaty-container');
      const el = document.createElement('div');
      el.className = 'floating-text'; el.textContent = text;
      el.style.left = x + 'px'; el.style.top = y + 'px'; el.style.color = color; el.style.textShadow = `0 0 10px ${color}`;
      fc.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    },

    loadTask() {
      if (this.currentTaskIndex >= CFG.tasks.length) return this.gameOver();
      
      const task = CFG.tasks[this.currentTaskIndex];
      document.getElementById('question-text').textContent = task.q;
      const pct = (this.currentTaskIndex / CFG.tasks.length) * 100;
      document.getElementById('progress-fill').style.width = `${pct}%`;
      document.getElementById('score-display').textContent = this.score;
      document.getElementById('combo-display').textContent = this.combo.toFixed(1);

      this.targets = [];
      let allAnswers = [ { text: task.correct[0] || "Да", isCorrect: true } ];
      (task.wrong || []).forEach(w => { if(w.trim()) allAnswers.push({ text: w.trim(), isCorrect: false }); });
      allAnswers.sort(() => Math.random() - 0.5);

      const targetW = 140, targetH = 60;
      const rowCapacity = Math.max(2, Math.ceil(allAnswers.length / 2)); 
      const zoneWidth = canvas.width / rowCapacity; 

      allAnswers.forEach((ans, i) => {
        const row = i % 2; 
        const col = Math.floor(i / 2); 
        const minX = col * zoneWidth + targetW/2 + 20;
        const maxX = (col + 1) * zoneWidth - targetW/2 - 20;
        
        this.targets.push({
          text: ans.text, isCorrect: ans.isCorrect,
          minX: minX, maxX: maxX,
          x: minX + Math.random() * (maxX - minX),
          y: canvas.height * 0.25 + (row * 100),
          w: targetW, h: targetH,
          speed: (Math.random() * 1.5 + 1.0) * (Math.random() > 0.5 ? 1 : -1) 
        });
      });

      this.hookState = 'swinging'; this.hook.length = 80;
    },

    shoot() {
      if (this.state === 'playing' && this.hookState === 'swinging') {
        this.hookState = 'shooting';
        this.hook.maxLength = canvas.height * 1.2;
      }
    },

    update() {
      if (this.state !== 'playing') return;

      const speed = CFG.gameplay.hookSpeed || 9;
      const swingSpeed = CFG.gameplay.swingSpeed || 0.035;
      
      this.hook.x = canvas.width / 2;
      this.hook.y = canvas.height - (CFG.visual.heroYOffset || 80) + (CFG.visual.hookOffsetY || 0);

      this.targets.forEach(t => {
        t.x += t.speed;
        if (t.x > t.maxX) { t.x = t.maxX; t.speed *= -1; }
        if (t.x < t.minX) { t.x = t.minX; t.speed *= -1; }
      });

      if (this.hookState === 'swinging') {
        this.hook.time += swingSpeed;
        this.hook.angle = Math.sin(this.hook.time) * (Math.PI / 2.2);
      } 
      else if (this.hookState === 'shooting') {
        this.hook.length += speed;
        const hx = this.hook.x + Math.sin(this.hook.angle) * this.hook.length;
        const hy = this.hook.y - Math.cos(this.hook.angle) * this.hook.length;

        for (let i = 0; i < this.targets.length; i++) {
          let t = this.targets[i];
          // Если произошло касание мишени
          if (Math.abs(hx - t.x) < t.w/2 && Math.abs(hy - t.y) < t.h/2) {
            this.hookState = 'retracting'; // СРАЗУ тащим обратно
            this.hook.caughtTarget = t;
            this.targets.splice(i, 1); 
            break;
          }
        }
        // Если пролетел мимо всех мишеней
        if (this.hook.length > this.hook.maxLength) {
           this.hookState = 'retracting';
           this.combo = 1.0; 
           document.getElementById('combo-display').textContent = this.combo.toFixed(1);
        }
      } 
      else if (this.hookState === 'retracting') {
        this.hook.length -= speed * 1.5; // Сматываем быстрее, чем стреляли
        
        if (this.hook.caughtTarget) {
          this.hook.caughtTarget.x = this.hook.x + Math.sin(this.hook.angle) * this.hook.length;
          this.hook.caughtTarget.y = this.hook.y - Math.cos(this.hook.angle) * this.hook.length;
          // Временно добавляем обратно в список для отрисовки
          this.targets.push(this.hook.caughtTarget);
          this.hook.caughtTarget = null;
        }

        if (this.hook.length <= 80) {
          this.hookState = 'swinging'; 
          this.hook.length = 80;
          
          let caughtIndex = this.targets.findIndex(t => t.y > canvas.height - 200);
          if (caughtIndex !== -1) {
            let caught = this.targets[caughtIndex];
            
            if (caught.isCorrect) {
              let pts = Math.floor(100 * this.combo);
              this.score += pts;
              this.spawnFloaty(`+${pts} (x${this.combo.toFixed(1)})`, this.hook.x, this.hook.y - 120, '#00ffcc');
              this.combo = Math.min(this.combo + 0.5, 5.0);
              
              confetti({ particleCount: 100, spread: 70, origin: { y: 0.9 }, colors: [CFG.visual.ropeColor, '#ffffff'] });
              this.currentTaskIndex++;
              setTimeout(() => this.loadTask(), 800);
            } else {
              this.combo = 1.0;
              document.getElementById('combo-display').textContent = this.combo.toFixed(1);
              this.spawnFloaty("Промах!", this.hook.x, this.hook.y - 120, '#e74c3c');
              document.getElementById('question-text').textContent = "Ой! Не та мишень!";
              
              // Возвращаем мишень наверх
              caught.y = canvas.height * 0.25; 
              setTimeout(() => this.loadTask(), 1200);
            }
          }
        }
      }
    },

    draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      this.targets.forEach(t => {
        let hasImage = false;
        if(CFG.visual.target) {
            hasImage = renderEntity(CFG.visual.target, t.x, t.y, t.w, true, t.w, t.h);
        }
        
        if(!hasImage) {
            ctx.fillStyle = 'rgba(30,30,30,0.8)';
            ctx.beginPath(); ctx.roundRect(t.x - t.w/2, t.y - t.h/2, t.w, t.h, 10); ctx.fill();
            ctx.strokeStyle = CFG.visual.ropeColor; ctx.lineWidth = 2; ctx.stroke();
        }
        
        ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Montserrat';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(t.text, t.x, t.y);
      });

      this.hook.x = canvas.width / 2;
      this.hook.y = canvas.height - (CFG.visual.heroYOffset || 80) + (CFG.visual.hookOffsetY || 0);
      const hx = this.hook.x + Math.sin(this.hook.angle) * this.hook.length;
      const hy = this.hook.y - Math.cos(this.hook.angle) * this.hook.length;

      // ЦЕПЬ
      drawChain(this.hook.x, this.hook.y, hx, hy, CFG.visual.ropeColor || "#bdc3c7");

      // Крюк
      renderEntity(CFG.visual.hook || "⚓", hx, hy, CFG.visual.hookSize || 50);

      // Персонаж
      const heroX = canvas.width / 2;
      const heroY = canvas.height - (CFG.visual.heroYOffset || 80);
      renderEntity(CFG.visual.hero || "🧙‍♂️", heroX, heroY, CFG.visual.heroSize || 120);
    },

    loop() {
      if (this.state !== 'playing') return;
      this.update(); this.draw();
      requestAnimationFrame(() => this.loop());
    },

    gameOver() {
      this.state = 'gameover';
      document.getElementById('ui-layer').style.display = 'none';
      document.getElementById('end-screen').style.display = 'flex';
      document.getElementById('end-title').textContent = CFG.ui.win || "КВИЗ ПРОЙДЕН!";
      document.getElementById('end-score').textContent = "Счёт: " + this.score;
      confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 }, colors: [CFG.visual.ropeColor, '#ffffff'] });
    }
  };

  window.addEventListener('keydown', (e) => { if (e.code === 'Space') Game.shoot(); });
  canvas.addEventListener('mousedown', () => Game.shoot());
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); Game.shoot(); }, {passive: false});

  document.getElementById('btnStart').onclick = () => Game.start();
  document.getElementById('btnAgain').onclick = () => Game.start();

  (async function init() {
    await loadConfig();
    applyUI();
    Game.reset();
  })();
</script>
</body>
</html>
