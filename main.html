<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quiz Miner</title>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght@400;700;900&family=Nunito:wght@700&family=Russo+One&family=Pacifico&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
      startup: { typeset: false } 
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    :root {
      --theme-glow: #00ffcc;
    }
    
    * { box-sizing: border-box; }
    
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#111; }
    html.transparent-bg, body.transparent-bg { background: transparent !important; }

    #game-app {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      background: radial-gradient(circle at bottom, #1a252f, #0a0a0a);
      font-family: 'Montserrat', sans-serif;
      user-select: none;
      position: relative;
    }
    #game-app.transparent-bg { background: transparent !important; }

    canvas { display: block; width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 1; background: transparent; }

    /* === СОВРЕМЕННЫЙ ИГРОВОЙ HUD === */
    .ui-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      padding: 15px 20px; box-sizing: border-box;
      pointer-events: none; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
    }

    .hud-header {
      display: flex; flex-direction: row; justify-content: space-between; align-items: center; 
      width: 100%; max-width: 1400px; gap: 15px;
    }

    .hud-left { flex: 1; display: flex; justify-content: flex-start; }
    .hud-center { flex: 2; display: flex; justify-content: center; }
    .hud-right { flex: 1; display: flex; justify-content: flex-end; }

    /* === УНИФИЦИРОВАННЫЕ ПАНЕЛИ === */
    .hud-panel {
      position: relative;
      border-radius: 15px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    /* === ТОЛСТЫЙ ПРОГРЕСС-БАР === */
    .p-wrap { width: 100%; max-width: 250px; padding: 10px 15px; min-height: 56px; justify-content: flex-start; }
    .progress-fill { 
      width: 0%; height: 20px;
      background: var(--theme-glow);
      border-radius: 10px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
      box-shadow: 0 0 15px var(--theme-glow);
    }

    /* === ВОПРОС === */
    .q-inner {
      padding: 15px 40px;
      font-weight: 900; text-align: center; color: #fff;
      text-transform: uppercase; letter-spacing: 1px;
      min-width: 250px; max-width: 100%;
    }
    
    /* === ОЧКИ И КОМБО === */
    .s-wrap { padding: 12px 24px; flex-direction: row; gap: 15px; min-height: 56px;}
    .score-val { font-size: 4vmin; font-weight: 900; line-height: 1; }
    .combo-badge { font-size: 3vmin; font-weight: 900; display: flex; align-items: center; gap: 6px; }

    .overlay {
      position: absolute; inset: 0; z-index: 100; background: rgba(10, 10, 10, 0.95);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: white; text-align: center;
    }
    h1 { font-family: 'Fredoka One', cursive; font-size: 10vmin; margin: 0; text-shadow: 0 0 20px var(--theme-glow); color: #fff; margin-bottom: 20px;}
    
    /* === ЭКРАН ЗАГРУЗКИ (ЛОУДЕР) === */
    #loader-screen { z-index: 9999; background: #111; }
    .spinner {
      width: 60px; height: 60px;
      border: 6px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--theme-glow);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .loader-text {
      font-family: 'Fredoka One', cursive; font-size: 4vmin; color: var(--theme-glow);
      text-shadow: 0 0 15px var(--theme-glow); animation: pulseText 1.5s infinite;
    }
    @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* === КНОПКИ === */
    .btn-wrap {
      border-radius: 49px; cursor: pointer; pointer-events: auto; margin-top: 30px; transition: transform 0.1s;
    }
    .btn-wrap:active { transform: scale(0.92); filter: brightness(0.8); }
    .btn {
      padding: 12px 45px; border-radius: 49px; text-transform: uppercase;
      outline: none; pointer-events: none; 
      box-sizing: border-box; font-weight: 900;
    }
    
    @keyframes pulseBtn { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
    @keyframes glitchBtn {
      0% { transform: translate(0); } 20% { transform: translate(-3px, 3px); }
      40% { transform: translate(-3px, -3px); } 60% { transform: translate(3px, 3px); }
      80% { transform: translate(3px, -3px); } 100% { transform: translate(0); }
    }

    .floating-text {
      position: absolute; font-family: 'Fredoka One', cursive;
      font-size: 5vmin; color: #fff; 
      pointer-events: none; z-index: 50; animation: floatUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    @keyframes floatUp { 0% { transform: translateY(0) scale(0.8); opacity: 0; } 20% { transform: translateY(-20px) scale(1.2); opacity: 1; } 100% { transform: translateY(-100px) scale(1); opacity: 0; } }
    
    /* === HTML ТЕКСТЫ ЦЕЛЕЙ === */
    .target-html-label {
      position: absolute;
      transform: translate(-50%, -50%);
      border-radius: 12px; padding: 8px 15px;
      white-space: nowrap; text-align: center; font-weight: bold;
      pointer-events: none; min-width: 60px; box-sizing: border-box;
      display: flex; align-items: center; justify-content: center; z-index: 5;
    }
    .target-html-label mjx-container { margin: 0 !important; }
  </style>
</head>
<body>

<div id="game-app">
  <canvas id="gameCanvas"></canvas>
  <div id="targets-container" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:5;"></div>
  <div id="floaty-container"></div>
  
  <div id="mute-toggle" style="position: absolute; bottom: 20px; right: 20px; font-size: 30px; cursor: pointer; z-index: 1000; opacity: 0.7; filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5)); transition: opacity 0.2s;">🔊</div>

  <div id="loader-screen" class="overlay">
    <div class="spinner"></div>
    <div class="loader-text">ИДЕТ ЗАГРУЗКА...</div>
  </div>

  <div class="ui-layer" id="ui-layer" style="display:none;">
    <div class="hud-header">
      <div class="hud-left">
        <div class="hud-panel p-wrap" id="hud-progress-panel">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
      
      <div class="hud-center">
        <div class="hud-panel q-inner" id="question-text">Загрузка...</div>
      </div>

      <div class="hud-right">
        <div class="hud-panel s-wrap" id="hud-score-panel">
          <div class="score-val" id="score-display" style="color: inherit; text-shadow: inherit;">0</div>
          <div class="combo-badge" style="color: inherit; text-shadow: inherit;">🔥 <span id="combo-display">x1</span></div>
        </div>
      </div>
    </div>
  </div>

  <div id="start-screen" class="overlay" style="display:none;">
    <h1 id="uiTitle">QUIZ MINER</h1>
    <div id="cfgNote" style="margin-top:10px; opacity:0.8;"></div>
    
    <div class="btn-wrap" id="btnStartWrap">
      <div class="hud-panel btn" id="btnStart">СТАРТ</div>
    </div>
  </div>

  <div id="end-screen" class="overlay" style="display:none; flex-direction: column; justify-content: center; align-items: center;">
    <h1 style="font-size: 15vmin; text-shadow:none; margin-bottom: 0;" id="end-emoji">🏆</h1>
    <h1 id="end-title" style="font-family: inherit; margin: 10px 0;">ВЫ ИГРАЛИ ВЕЛИКОЛЕПНО!</h1>
    <p style="font-size: 6vmin; font-weight: bold; color:var(--theme-glow); text-shadow: 0 0 15px var(--theme-glow); margin: 10px 0 30px 0;" id="end-score">0</p>
    
    <div class="btn-wrap" id="btnAgainWrap">
      <div class="hud-panel btn" id="btnAgain">ЕЩЁ РАЗ</div>
    </div>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(location.search);
  const cfgId = urlParams.get('id');
  const previewMode = urlParams.get('preview') === '1';

  const JSON_BASES = ["https://nikashum93.github.io/texts/data/", "https://nikashum93.github.io/data/"];

  let CFG = {
    ui: { 
      title: "КРЮКОХВАТ", hideTitle: false, titleImg: "", 
      start: "СТАРТ", again: "ЕЩЁ РАЗ", win: "КВИЗ ПРОЙДЕН!"
    },
    visual: { 
      bgTransparent: false,
      hero: "hero.png", hook: "hook.png", targets: ["target.png"], 
      ropeColor: "#bdc3c7", 
      heroSize: 150, heroX: 0, hookSize: 60, hookOffsetY: 0, targetSize: 90,
      fontFamily: "Montserrat", 
      
      qColor: "#ffffff", qBg: "rgba(15, 20, 25, 0.95)", qGlow: "#00ffcc", qBorder: "both", qTextGlow: true, qSize: 4.5,
      tColor: "#ffffff", tBg: "rgba(15, 20, 25, 0.95)", tGlow: "#00ffcc", tBorder: "solid", tTextGlow: false, tSize: 22,
      hudColor: "#ffffff", hudBg: "rgba(15, 20, 25, 0.95)", hudGlow: "#00ffcc", hudBorder: "both", hudTextGlow: true,
      btnColor: "#ffffff", btnBg: "#e74c3c", btnGlow: "#c0392b", btnBorder: "both", btnTextGlow: false
    },
    gameplay: { hookSpeed: 10, swingSpeed: 0.035, targetSpeed: 1 }, 
    tasks: [] 
  };

  const hookAudio = new Audio();
  const imgCache = {};
  let isMuted = false;

  // --- ЛОГИКА КНОПКИ ЗВУКА ---
  const muteBtn = document.getElementById('mute-toggle');
  muteBtn.addEventListener('mousedown', (e) => { e.stopPropagation(); });
  muteBtn.addEventListener('touchstart', (e) => { e.stopPropagation(); }, {passive: false});
  muteBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      isMuted = !isMuted;
      muteBtn.textContent = isMuted ? '🔇' : '🔊';
  });

  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'MINER_CFG') {
      CFG = Object.assign({}, CFG, e.data.cfg);
      applyUI();
      preloadImagesAndStart();
    }
  });

  async function loadConfig() {
    if (previewMode) return;
    if (!cfgId) return;
    try {
      let res = null;
      for (const base of JSON_BASES) {
        try { res = await fetch(`${base}${encodeURIComponent(cfgId)}.json?v=${Date.now()}`); if (res.ok) break; } catch(e){}
      }
      if (res && res.ok) {
        CFG = Object.assign({}, CFG, await res.json());
      }
    } catch (e) { document.getElementById('cfgNote').textContent = '⚠️ Конфиг не найден'; }
  }

  // --- УНИВЕРСАЛЬНАЯ ФУНКЦИЯ ПРИМЕНЕНИЯ СТИЛЕЙ К ПАНЕЛЯМ ---
  function applyPanelStyle(el, prefix) {
      if(!el) return;
      const col = CFG.visual[prefix+'Color'] || '#ffffff';
      const bg = CFG.visual[prefix+'Bg'] || 'rgba(15, 20, 25, 0.95)';
      const glow = CFG.visual[prefix+'Glow'] || '#00ffcc';
      const borderStyle = CFG.visual[prefix+'Border'] || 'solid';
      const textGlowOn = CFG.visual[prefix+'TextGlow'];

      el.style.color = col;
      el.style.backgroundColor = bg;
      
      if (borderStyle === 'solid') {
          el.style.border = `2px solid ${glow}`;
          el.style.boxShadow = 'none';
      } else if (borderStyle === 'glow') {
          el.style.border = 'none';
          el.style.boxShadow = `0 0 15px ${glow}`;
      } else if (borderStyle === 'both') {
          el.style.border = `2px solid ${glow}`;
          el.style.boxShadow = `0 0 15px ${glow}`;
      } else {
          el.style.border = 'none';
          el.style.boxShadow = 'none';
      }
      
      // Свечение букв включается строго по галочке
      if (textGlowOn && glow !== '#000000') {
          el.style.textShadow = `0 0 10px ${glow}`;
      } else {
          el.style.textShadow = 'none';
      }
  }

  function applyUI() {
    document.getElementById('uiTitle').textContent = CFG.ui.title || "КРЮКОХВАТ";
    document.getElementById('uiTitle').style.display = CFG.ui.hideTitle ? 'none' : 'block';

    const btnStart = document.getElementById('btnStart');
    const btnAgain = document.getElementById('btnAgain');
    btnStart.textContent = CFG.ui.start || "СТАРТ";
    btnAgain.textContent = CFG.ui.again || "ЕЩЁ РАЗ";

    const startScreen = document.getElementById('start-screen');
    if (CFG.ui.titleImg && CFG.ui.titleImg.trim() !== "") {
      startScreen.style.background = `url("${CFG.ui.titleImg}") center/cover no-repeat`;
    } else {
      startScreen.style.background = `rgba(10, 10, 10, 0.95)`;
    }

    if (CFG.visual.bgTransparent) {
      document.documentElement.classList.add('transparent-bg');
      document.body.classList.add('transparent-bg');
      document.getElementById('game-app').classList.add('transparent-bg');
      document.getElementById('loader-screen').style.background = 'rgba(10, 10, 10, 0.9)';
    } else {
      document.documentElement.classList.remove('transparent-bg');
      document.body.classList.remove('transparent-bg');
      document.getElementById('game-app').classList.remove('transparent-bg');
      document.getElementById('loader-screen').style.background = '#111';
    }

    hookAudio.src = "https://github.com/NikaShum93/hk/raw/refs/heads/main/chain.mp3";
    hookAudio.preload = 'auto';

    let themeGlow = (CFG.visual.qGlow && CFG.visual.qGlow !== "#000000") ? CFG.visual.qGlow : "#00ffcc";
    document.documentElement.style.setProperty('--theme-glow', themeGlow);

    const font = `"${CFG.visual.fontFamily}", sans-serif`;
    document.getElementById('game-app').style.fontFamily = font;
    btnStart.style.fontFamily = font;
    btnAgain.style.fontFamily = font;
    document.getElementById('uiTitle').style.fontFamily = font;
    document.querySelector('.loader-text').style.fontFamily = font;

    const size = CFG.ui.btnSize || 5;
    btnStart.style.fontSize = `${size}vmin`;
    btnAgain.style.fontSize = `${size}vmin`;

    // --- ПРИМЕНЕНИЕ СТИЛЕЙ К ЭЛЕМЕНТАМ ИНТЕРФЕЙСА ---
    
    // 1. Вопрос
    const qbInner = document.getElementById('question-text');
    applyPanelStyle(qbInner, 'q');
    qbInner.style.fontSize = (CFG.visual.qSize || 4.5) + "vmin";

    // 2. Верхняя панель (HUD)
    applyPanelStyle(document.getElementById('hud-progress-panel'), 'hud');
    applyPanelStyle(document.getElementById('hud-score-panel'), 'hud');
    
    // 3. Кнопки (применяем универсальный стиль)
    applyPanelStyle(btnStart, 'btn');
    applyPanelStyle(btnAgain, 'btn');
    
    // Цвет наполнения прогресс-бара
    const pFill = document.getElementById('progress-fill');
    const hGlow = CFG.visual.hudGlow || '#00ffcc';
    pFill.style.background = hGlow;
    pFill.style.boxShadow = `0 0 15px ${hGlow}`;

    // --- ПОЗИЦИЯ ПРИМЕНЯЕТСЯ ТОЛЬКО К СТАРТУ ---
    const btnWrapStart = document.getElementById('btnStartWrap');
    if (CFG.ui.btnY) {
      btnWrapStart.style.position = 'absolute';
      btnWrapStart.style.top = CFG.ui.btnY + '%';
      btnWrapStart.style.marginTop = '0';
    }

    if (CFG.ui.btnAnim === 'pulse') {
      btnStart.style.animation = 'pulseBtn 1.5s infinite';
      btnAgain.style.animation = 'pulseBtn 1.5s infinite';
    } else if (CFG.ui.btnAnim === 'glitch') {
      btnStart.style.animation = 'glitchBtn 0.3s infinite';
      btnAgain.style.animation = 'glitchBtn 0.3s infinite';
    } else {
      btnStart.style.animation = 'none';
      btnAgain.style.animation = 'none';
    }
  }

  // --- ПРЕДЗАГРУЗКА КАРТИНОК ---
  async function preloadImagesAndStart() {
    const urlsToLoad = [];
    if (CFG.visual.hero) urlsToLoad.push(CFG.visual.hero);
    if (CFG.visual.hook) urlsToLoad.push(CFG.visual.hook);
    if (CFG.ui.titleImg) urlsToLoad.push(CFG.ui.titleImg);
    if (CFG.visual.targets && CFG.visual.targets.length > 0) {
      CFG.visual.targets.forEach(t => urlsToLoad.push(t));
    }

    const loadPromises = urlsToLoad.filter(url => url && url.trim() !== '').map(url => {
      return new Promise(resolve => {
        if (imgCache[url]) return resolve(); // Уже загружено
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.onload = () => { imgCache[url] = img; resolve(); };
        img.onerror = () => resolve(); // Игнорируем ошибку, чтобы игра не зависла
        img.src = url;
      });
    });

    // Ждем загрузки всех картинок
    await Promise.all(loadPromises);

    // Прячем лоудер, запускаем игру
    document.getElementById('loader-screen').style.display = 'none';
    Game.reset();
  }

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  function hasValidImage(val) {
    if (!val || val.trim() === '') return false;
    return imgCache[val] && imgCache[val].complete && imgCache[val].naturalWidth > 0;
  }

  function renderEntity(val, x, y, size) {
    if (hasValidImage(val)) {
      ctx.drawImage(imgCache[val], x - size/2, y - size/2, size, size);
      return true;
    }
    return false;
  }

  function drawChain(x1, y1, x2, y2, color) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const angle = Math.atan2(dy, dx);
    const linkLength = 18; 
    const numLinks = Math.max(1, Math.floor(dist / linkLength));

    ctx.save();
    ctx.translate(x1, y1);
    ctx.rotate(angle);

    for (let i = 0; i < numLinks; i++) {
      ctx.beginPath();
      ctx.ellipse(i * linkLength + linkLength/2, 0, linkLength/2, 5, 0, 0, Math.PI * 2);
      ctx.strokeStyle = '#111'; ctx.lineWidth = 6; ctx.stroke();

      ctx.beginPath();
      ctx.ellipse(i * linkLength + linkLength/2, 0, linkLength/2, 5, 0, 0, Math.PI * 2);
      ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.stroke();

      ctx.beginPath();
      ctx.ellipse(i * linkLength + linkLength/2 - 1, -1, linkLength/2 - 2, 2, 0, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 1; ctx.stroke();
    }
    ctx.restore();
  }

  const Game = {
    state: 'idle',
    hookState: 'swinging',
    score: 0,
    combo: 1.0,
    currentTaskIndex: 0,
    targets: [],
    hook: { x: 0, y: 0, angle: 0, length: 80, maxLength: 1000, time: 0, caughtTarget: null },

    reset() {
      this.score = 0; this.combo = 1.0; this.currentTaskIndex = 0;
      this.state = 'idle'; this.hookState = 'swinging'; this.hook.length = 80; this.targets = [];
      document.getElementById('start-screen').style.display = 'flex';
      document.getElementById('ui-layer').style.display = 'none';
      document.getElementById('end-screen').style.display = 'none';
      document.getElementById('targets-container').innerHTML = '';
      this.draw();
    },

    start() {
      if(!CFG.tasks || CFG.tasks.length === 0) return alert("Нет заданий!");
      
      this.score = 0; 
      this.combo = 1.0; 
      this.currentTaskIndex = 0;
      this.state = 'playing';
      
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('end-screen').style.display = 'none';
      document.getElementById('ui-layer').style.display = 'flex';
      
      this.loadTask();
      this.loop();
    },

    spawnFloaty(text, x, y, color, shadowColor) {
      const fc = document.getElementById('floaty-container');
      const el = document.createElement('div');
      el.className = 'floating-text'; el.textContent = text;
      el.style.left = x + 'px'; el.style.top = y + 'px'; el.style.color = color; el.style.textShadow = `0 0 15px ${shadowColor}, 0 2px 4px #000`;
      fc.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    },

    loadTask() {
      if (this.currentTaskIndex >= CFG.tasks.length) return this.gameOver();
      
      const tc = document.getElementById('targets-container');
      tc.innerHTML = ''; // Очищаем контейнер старых мишеней

      const task = CFG.tasks[this.currentTaskIndex];
      const qbInner = document.getElementById('question-text');
      qbInner.innerHTML = task.q; // Меняем на innerHTML для поддержки тегов и формул

      const pct = (this.currentTaskIndex / CFG.tasks.length) * 100;
      document.getElementById('progress-fill').style.width = `${pct}%`;
      document.getElementById('score-display').textContent = this.score;
      
      let comboText = this.combo % 1 === 0 ? this.combo.toFixed(0) : this.combo.toFixed(1);
      document.getElementById('combo-display').textContent = `x${comboText}`;

      this.targets = [];
      let allAnswers = [ { text: task.correct[0] || "Да", isCorrect: true } ];
      (task.wrong || []).forEach(w => { if(w.trim()) allAnswers.push({ text: w.trim(), isCorrect: false }); });
      allAnswers.sort(() => Math.random() - 0.5);

      const assetsList = (CFG.visual.targets && CFG.visual.targets.length > 0) ? [...CFG.visual.targets] : [""];
      
      const targetW = CFG.visual.targetSize || 90;
      const maxCols = 2;
      
      // СТРОГИЕ ОТСТУПЫ: высчитываем безопасную зону для мишеней
      const uiHeader = document.querySelector('.hud-header');
      const uiHeaderBottom = uiHeader ? uiHeader.offsetHeight + 20 : 100;
      const heroTop = canvas.height - (CFG.visual.heroSize || 150) - 20;

      const safeTop = Math.max(120, uiHeaderBottom + targetW/2 + 10);
      const safeBottom = heroTop - targetW/2 - 30; // Жесткий отступ над героем
      const availableH = Math.max(10, safeBottom - safeTop);
      
      let totalRows = Math.ceil(allAnswers.length / maxCols);
      
      // Блок вариантов будет компактным
      const rowSpacing = targetW + 65; // УВЕЛИЧЕН ОТСТУП
      const totalBlockHeight = (totalRows - 1) * rowSpacing;

      // Центрируем весь блок мишеней в безопасной зоне
      let startY = safeTop + (availableH - totalBlockHeight) / 2;
      if (startY < safeTop) startY = safeTop; // Failsafe
      
      let answerIndex = 0;

      for (let r = 0; r < totalRows; r++) {
          let itemsInRow = Math.min(maxCols, allAnswers.length - answerIndex);
          let zoneWidth = canvas.width / itemsInRow;
          
          let yPos = startY + (r * rowSpacing);

          for (let c = 0; c < itemsInRow; c++) {
              let ans = allAnswers[answerIndex];
              const minX = c * zoneWidth + targetW/2 + 20;
              const maxX = (c + 1) * zoneWidth - targetW/2 - 20;
              
              const speedMul = (CFG.gameplay && CFG.gameplay.targetSpeed !== undefined) ? CFG.gameplay.targetSpeed : 1;
              
              // Создаем HTML-элемент для таблички мишени
              let el = document.createElement('div');
              el.className = 'target-html-label';
              el.innerHTML = ans.text;
              
              applyPanelStyle(el, 't'); // Применяем стили из настроек
              el.style.fontSize = (CFG.visual.tSize || 22) + "px";
              el.style.fontFamily = `"${CFG.visual.fontFamily}", sans-serif`;

              tc.appendChild(el);

              this.targets.push({
                 text: ans.text,
                 isCorrect: ans.isCorrect,
                 asset: assetsList[answerIndex % assetsList.length],
                 minX: minX,
                 maxX: Math.max(minX, maxX),
                 x: minX + Math.random() * Math.max(0, maxX - minX),
                 y: yPos,
                 w: targetW, h: targetW,
                 hitX: 0, hitY: 0, hitW: 0, hitH: 0,
                 speed: (Math.random() * 1.5 + 1.0) * (c % 2 === 0 ? 1 : -1) * speedMul,
                 el: el
              });
              answerIndex++;
          }
      }

      // Вызываем единый рендер MathJax для вопроса и всех созданных мишеней
      if (window.MathJax && window.MathJax.typesetPromise) {
          MathJax.typesetPromise([qbInner, tc]).catch(err => console.log(err));
      }

      this.hookState = 'swinging'; this.hook.length = 80;
    },

    shoot() {
      if (this.state === 'playing' && this.hookState === 'swinging') {
        this.hookState = 'shooting';
        this.hook.maxLength = canvas.height * 1.2;
        
        if (!isMuted && hookAudio.src) {
            let snd = hookAudio.cloneNode();
            snd.play().catch(e => console.log('Audio error:', e));
        }
      }
    },

    update() {
      if (this.state !== 'playing') return;

      const flightSpeed = 18; 
      const swingSpeed = ((CFG.gameplay.hookSpeed || 10) / 10) * 0.035;
      
      this.hook.x = canvas.width / 2;
      this.hook.y = canvas.height - (CFG.visual.heroSize || 150)/2 + (CFG.visual.hookOffsetY || 0);

      // СЛОУ-МО при броске
      let timeScale = (this.hookState === 'shooting' || this.hookState === 'retracting') ? 0.25 : 1.0;

      this.targets.forEach(t => {
        t.x += (t.speed * timeScale); 
        if (t.x > t.maxX) { t.x = t.maxX; t.speed *= -1; }
        if (t.x < t.minX) { t.x = t.minX; t.speed *= -1; }
      });

      if (this.hookState === 'swinging') {
        this.hook.time += swingSpeed;
        this.hook.angle = Math.sin(this.hook.time) * (Math.PI / 2.2);
      } 
      else if (this.hookState === 'shooting') {
        this.hook.length += flightSpeed;
        const hx = this.hook.x + Math.sin(this.hook.angle) * this.hook.length;
        const hy = this.hook.y - Math.cos(this.hook.angle) * this.hook.length;

        const hitPadding = 65; // УВЕЛИЧЕН РАДИУС

        for (let i = 0; i < this.targets.length; i++) {
          let t = this.targets[i];
          if (Math.abs(hx - t.hitX) < (t.hitW/2 + hitPadding) && Math.abs(hy - t.hitY) < (t.hitH/2 + hitPadding)) {
            this.hookState = 'retracting';
            this.hook.caughtTarget = t; 
            this.targets.splice(i, 1); 
            break;
          }
        }
        if (this.hook.length > this.hook.maxLength) {
           this.hookState = 'retracting';
           this.combo = 1.0; 
           document.getElementById('combo-display').textContent = `x1`;
        }
      } 
      else if (this.hookState === 'retracting') {
        this.hook.length -= flightSpeed * 1.5; 
        
        if (this.hook.caughtTarget) {
          this.hook.caughtTarget.x = this.hook.x + Math.sin(this.hook.angle) * this.hook.length;
          this.hook.caughtTarget.y = this.hook.y - Math.cos(this.hook.angle) * this.hook.length;
        }

        if (this.hook.length <= 80) {
          this.hookState = 'swinging'; 
          this.hook.length = 80;
          
          if (this.hook.caughtTarget) {
            let caught = this.hook.caughtTarget;
            this.hook.caughtTarget = null;
            
            if (caught.isCorrect) {
              // Мгновенно скрываем HTML табличку пойманной правильной цели
              if(caught.el) caught.el.style.display = 'none';

              let pts = Math.floor(100 * this.combo);
              this.score += pts;
              this.spawnFloaty(`+${pts}`, this.hook.x, this.hook.y - 120, '#00ffcc', '#00ffcc');
              
              if(this.combo > 1.0) {
                  let cText = this.combo % 1 === 0 ? this.combo.toFixed(0) : this.combo.toFixed(1);
                  this.spawnFloaty(`x${cText}`, this.hook.x + 40, this.hook.y - 90, '#f1c40f', '#f39c12');
              }
              
              this.combo = Math.min(this.combo + 0.5, 5.0);
              
              let tGlow = (CFG.visual.qGlow && CFG.visual.qGlow !== "#000000") ? CFG.visual.qGlow : '#00ffcc';
              confetti({ particleCount: 100, spread: 70, origin: { y: 0.9 }, colors: [CFG.visual.ropeColor, '#f1c40f', tGlow] });
              this.currentTaskIndex++;
              setTimeout(() => this.loadTask(), 800);
            } else {
              this.combo = 1.0;
              document.getElementById('combo-display').textContent = `x1`;
              this.spawnFloaty("ПРОМАХ!", this.hook.x, this.hook.y - 120, '#e74c3c', '#c0392b');
              
              this.targets.push(caught);
              setTimeout(() => this.loadTask(), 1200);
            }
          }
        }
      }
    },

    drawTargetEl(t) {
        const hasImg = hasValidImage(t.asset);

        // Получаем точные размеры от отрендеренного HTML-элемента (учитывая формулы)
        const tw = t.el ? Math.max(t.el.offsetWidth, 60) : 60;
        const th = t.el ? Math.max(t.el.offsetHeight, (CFG.visual.tSize || 22) + 16) : (CFG.visual.tSize || 22) + 16;
        
        let textY;

        if (hasImg) {
          renderEntity(t.asset, t.x, t.y, t.w);
          textY = t.y - t.h/2 - th/2 - 10;
          t.hitX = t.x; t.hitY = t.y; t.hitW = t.w; t.hitH = t.h;
        } else {
          textY = t.y;
          t.hitX = t.x; t.hitY = textY; t.hitW = tw; t.hitH = th;
        }

        // Обновляем позицию HTML таблички над холстом
        if (t.el) {
          t.el.style.left = t.x + 'px';
          t.el.style.top = textY + 'px';
        }
    },

    draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      this.targets.forEach(t => this.drawTargetEl(t));
      if (this.hook.caughtTarget) this.drawTargetEl(this.hook.caughtTarget);

      this.hook.x = canvas.width / 2;
      this.hook.y = canvas.height - (CFG.visual.heroSize || 150)/2 + (CFG.visual.hookOffsetY || 0);
      const hx = this.hook.x + Math.sin(this.hook.angle) * this.hook.length;
      const hy = this.hook.y - Math.cos(this.hook.angle) * this.hook.length;

      drawChain(this.hook.x, this.hook.y, hx, hy, CFG.visual.ropeColor || "#bdc3c7");
      renderEntity(CFG.visual.hook || "hook.png", hx, hy, CFG.visual.hookSize || 60);

      const heroX = (canvas.width / 2) + (CFG.visual.heroX || 0);
      const heroY = canvas.height - (CFG.visual.heroSize || 150)/2; 
      renderEntity(CFG.visual.hero || "hero.png", heroX, heroY, CFG.visual.heroSize || 150);
    },

    loop() {
      if (this.state !== 'playing') return;
      this.update(); this.draw();
      requestAnimationFrame(() => this.loop());
    },

    gameOver() {
      this.state = 'gameover';
      document.getElementById('ui-layer').style.display = 'none';
      document.getElementById('end-screen').style.display = 'flex';
      document.getElementById('end-title').textContent = CFG.ui.win || "КВИЗ ПРОЙДЕН!";
      document.getElementById('end-score').textContent = this.score;
      confetti({ particleCount: 250, spread: 120, origin: { y: 0.5 }, colors: [CFG.visual.ropeColor, '#f1c40f', '#00ffcc'] });
    }
  };

  window.addEventListener('keydown', (e) => { if (e.code === 'Space') Game.shoot(); });
  canvas.addEventListener('mousedown', () => Game.shoot());
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); Game.shoot(); }, {passive: false});

  function playHookSoundAndStart() {
    if (!isMuted && hookAudio.src) {
        let snd = hookAudio.cloneNode();
        snd.play().catch(e => console.log('Audio start error:', e));
    }
    Game.start();
  }

  document.getElementById('btnStartWrap').onclick = playHookSoundAndStart;
  document.getElementById('btnAgainWrap').onclick = playHookSoundAndStart;

  (async function init() {
    await loadConfig();
    applyUI();
    preloadImagesAndStart(); 
  })();
</script>
