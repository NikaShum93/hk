<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Игра - Quiz Miner</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    body {
      margin: 0; padding: 0;
      display: flex; justify-content: center; align-items: center;
      height: 100vh;
      background-color: #2c3e50;
      font-family: 'Segoe UI', sans-serif;
    }
    .game-container {
      position: relative;
      width: 600px; height: 500px;
      background-color: #ecf0f1;
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .ui-layer {
      position: absolute; top: 0; left: 0; width: 100%;
      padding: 20px; box-sizing: border-box; pointer-events: none;
      text-align: center; z-index: 10;
    }
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 15px;
    }
    .progress-bar-container {
      width: 60%; height: 10px; background-color: #bdc3c7; border-radius: 5px; overflow: hidden;
    }
    .progress-bar {
      width: 0%; height: 100%; background-color: #2ecc71; transition: width 0.3s ease;
    }
    .score { font-weight: bold; font-size: 18px; color: #34495e; }
    #question-text { margin: 0; color: #2c3e50; font-size: 22px; }
    canvas { display: block; cursor: crosshair; }
  </style>
</head>
<body>

  <div class="game-container">
    <div class="ui-layer">
      <div class="top-bar">
        <div class="progress-bar-container">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div class="score">Очки: <span id="score-display">0</span></div>
      </div>
      <h2 id="question-text">Загрузка вопросов...</h2>
    </div>
    
    <canvas id="gameCanvas" width="600" height="500"></canvas>
  </div>

  <script src="engine.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const ui = {
        questionText: document.getElementById('question-text'),
        scoreDisplay: document.getElementById('score-display'),
        progressBar: document.getElementById('progress-bar')
      };

      // Создаем экземпляр игры из engine.js
      const gameEngine = new QuizMinerEngine('gameCanvas', ui);

      // Имитируем получение данных с сервера (Mock Data)
      // В реальном расширении здесь будет fetch('https://твой-сервер/api/quiz')
      const mockServerData = [
        { question: "Самая большая планета?", answers: ["Марс", "Юпитер", "Земля", "Венера"], correct: 1 },
        { question: "Сколько бит в байте?", answers: ["4", "16", "8", "32"], correct: 2 },
        { question: "Язык стилей веба?", answers: ["HTML", "JS", "CSS", "PHP"], correct: 2 }
      ];

      // Загружаем фейковые данные в движок с задержкой, чтобы сымитировать пинг сервера
      setTimeout(() => {
        gameEngine.loadLevels(mockServerData);
        gameEngine.start();
      }, 500);
    });
  </script>

</body>
</html>
