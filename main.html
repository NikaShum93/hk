<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quiz Miner</title>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght@400;700;900&family=Nunito:wght@700&family=Russo+One&family=Pacifico&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --btn-color: #e74c3c;
      --btn-glow: #c0392b;
      --theme-glow: #00ffcc; /* Основной цвет неоновой обводки */
    }
    
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#111; }
    
    body.transparent-bg { background: transparent !important; }

    #game-app {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      background: radial-gradient(circle at bottom, #1a252f, #0a0a0a);
      font-family: 'Montserrat', sans-serif;
      user-select: none;
      position: relative;
    }
    #game-app.transparent-bg { background: transparent !important; }

    /* === СОВРЕМЕННЫЙ ИГРОВОЙ HUD === */
    .ui-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      padding: 20px; box-sizing: border-box;
      pointer-events: none; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
    }

    .hud-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      width: 100%; max-width: 1200px;
    }

    .hud-center {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 15px;
      margin-top: 5px;
    }

    .hud-right {
      position: absolute; right: 20px; top: 20px;
      display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
    }

    /* === БЕГАЮЩИЙ НЕОН (ОБЕРТКА) === */
    .glowing-wrap {
      position: relative;
      padding: 3px; /* Толщина неоновой рамки */
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }
    .glowing-wrap::before {
      content: ""; position: absolute; top: -100%; left: -100%; width: 300%; height: 300%;
      background: conic-gradient(transparent, transparent, var(--theme-glow), transparent 30%);
      animation: spinGlow 3s linear infinite;
      z-index: 0;
    }
    .glowing-inner {
      position: relative;
      background: rgba(15, 20, 25, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 21px; /* Чуть меньше обертки */
      z-index: 1;
      display: flex; align-items: center; justify-content: center;
    }
    @keyframes spinGlow { 100% { transform: rotate(360deg); } }

    /* === ВОПРОС === */
    .q-inner {
      padding: 15px 40px;
      font-size: 4.5vmin; font-weight: 900; text-align: center; color: #fff;
      text-transform: uppercase; letter-spacing: 1px;
      min-width: 250px; max-width: 90vw;
    }

    /* === ПРОГРЕСС-БАР === */
    .p-wrap { width: 100%; max-width: 400px; border-radius: 12px; }
    .p-inner { padding: 4px; border-radius: 9px; width: 100%; display: flex; justify-content: flex-start; }
    .progress-fill { 
      width: 0%; height: 10px; 
      background: var(--theme-glow);
      border-radius: 5px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
      box-shadow: 0 0 15px var(--theme-glow);
    }
    
    /* === ОЧКИ И КОМБО === */
    .s-wrap { border-radius: 20px; }
    .s-inner { padding: 12px 24px; flex-direction: column; gap: 4px; border-radius: 17px; }
    .score-val { 
      font-family: 'Fredoka One', cursive; font-size: 5vmin; 
      color: var(--theme-glow); text-shadow: 0 0 15px var(--theme-glow); line-height: 1; 
    }
    .combo-badge { 
      font-size: 2vmin; font-weight: 900; color: #fff; opacity: 0.9;
    }

    canvas { display: block; width: 100%; height: 100%; position: absolute; top:0; left:0; z-index: 1;}

    .overlay {
      position: absolute; inset: 0; z-index: 100; background: rgba(10, 10, 10, 0.95);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: white; text-align: center;
    }
    h1 { font-family: 'Fredoka One', cursive; font-size: 10vmin; margin: 0; text-shadow: 0 0 20px var(--theme-glow); }
    
    /* === 3D КНОПКА === */
    .btn {
      position: absolute; left: 50%; transform: translateX(-50%);
      color: #fff; font-family: 'Fredoka One', cursive;
      border-radius: 50px; cursor: pointer; pointer-events: auto;
      transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      background: linear-gradient(180deg, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0) 45%, rgba(0,0,0,0.2) 100%), var(--btn-color);
      border: 2px solid rgba(255,255,255,0.4);
      box-shadow: inset 0 6px 0 rgba(255,255,255,0.3), inset 0 -6px 0 rgba(0,0,0,0.3), 0 0 25px var(--btn-glow), 0 10px 20px rgba(0,0,0,0.7);
    }
    .btn:active { 
      transform: translateX(-50%) translateY(8px) scale(0.95) !important; 
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.3), inset 0 -2px 0 rgba(0,0,0,0.3), 0 0 15px var(--btn-glow), 0 2px 5px rgba(0,0,0,0.7);
      filter: brightness(0.9);
    }
    
    @keyframes pulse3D {
      0% { transform: translateX(-50%) scale(1); filter: brightness(1); }
      50% { transform: translateX(-50%) scale(1.05); filter: brightness(1.2); box-shadow: inset 0 6px 0 rgba(255,255,255,0.4), inset 0 -6px 0 rgba(0,0,0,0.3), 0 0 40px var(--btn-glow), 0 15px 25px rgba(0,0,0,0.8); }
      100% { transform: translateX(-50%) scale(1); filter: brightness(1); }
    }
    .anim-pulse { animation: pulse3D 2s ease-in-out infinite; }

    @keyframes glitchEff {
      0% { transform: translateX(-50%); }
      10% { transform: translateX(-52%) skewX(5deg); filter: hue-rotate(90deg) brightness(1.5); }
      20% { transform: translateX(-48%) skewX(-5deg); filter: hue-rotate(-90deg); }
      30% { transform: translateX(-50%); filter: hue-rotate(0); }
      100% { transform: translateX(-50%); }
    }
    .anim-glitch { animation: glitchEff 3s infinite; }
    
    .floating-text {
      position: absolute; font-family: 'Fredoka One', cursive;
      font-size: 5vmin; color: #fff; 
      pointer-events: none; z-index: 50; animation: floatUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    @keyframes floatUp { 0% { transform: translateY(0) scale(0.8); opacity: 0; } 20% { transform: translateY(-20px) scale(1.2); opacity: 1; } 100% { transform: translateY(-100px) scale(1); opacity: 0; } }
  </style>
</head>
<body>

<div id="game-app">
  <canvas id="gameCanvas"></canvas>
  <div id="floaty-container"></div>

  <div class="ui-layer" id="ui-layer" style="display:none;">
    <div class="hud-header">
      <div class="hud-center">
        <div class="glowing-wrap">
          <div class="glowing-inner q-inner" id="question-text">Загрузка...</div>
        </div>
        <div class="glowing-wrap p-wrap">
          <div class="glowing-inner p-inner">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="hud-right">
      <div class="glowing-wrap s-wrap">
        <div class="glowing-inner s-inner">
          <div class="score-val" id="score-display">0</div>
          <div class="combo-badge">🔥 КОМБО: x<span id="combo-display">1.0</span></div>
        </div>
      </div>
    </div>
  </div>

  <div id="start-screen" class="overlay">
    <h1 id="uiTitle">QUIZ MINER</h1>
    <div id="cfgNote" style="margin-top:10px; opacity:0.8;"></div>
    <button class="btn" id="btnStart">СТАРТ</button>
  </div>

  <div id="end-screen" class="overlay" style="display:none;">
    <h1 style="font-size: 15vmin; text-shadow:none;" id="end-emoji">🏆</h1>
    <h1 id="end-title" style="font-family: inherit;">ВЫ ИГРАЛИ ВЕЛИКОЛЕПНО!</h1>
    <p style="font-size: 6vmin; font-weight: bold; color:var(--theme-glow); text-shadow: 0 0 15px var(--theme-glow);" id="end-score">0</p>
    <button class="btn" id="btnAgain">ЕЩЁ РАЗ</button>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(location.search);
  const cfgId = urlParams.get('id');
  const previewMode = urlParams.get('preview') === '1';

  const JSON_BASES = ["https://nikashum93.github.io/texts/data/", "https://nikashum93.github.io/data/"];

  let CFG = {
    ui: { 
      title: "КРЮКОХВАТ", hideTitle: false, titleImg: "", 
      start: "СТАРТ", again: "ЕЩЁ РАЗ", win: "КВИЗ ПРОЙДЕН!",
      btnColor: "#e74c3c", btnGlow: "#c0392b", btnSize: 5, btnY: 80, btnAnim: "none"
    },
    visual: { 
      bgTransparent: false,
      hero: "hero.png", hook: "hook.png", hookSound: "", targets: ["target.png"], 
      ropeColor: "#bdc3c7", qBoxColor: "#ffffff",
      heroSize: 150, heroX: 0, hookSize: 60, hookOffsetY: 0, targetSize: 90,
      fontFamily: "Montserrat", qColor: "#ffffff", qGlow: "#000000", qSize: 4.5,
      tColor: "#ffffff", tGlow: "#000000", tSize: 22
    },
    gameplay: { hookSpeed: 10, swingSpeed: 0.035 }, 
    tasks: [] 
  };

  const hookAudio = new Audio();

  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'MINER_CFG') {
      CFG = Object.assign({}, CFG, e.data.cfg);
      applyUI();
      if(Game.state === 'idle') Game.reset();
    }
  });

  async function loadConfig() {
    if (previewMode) return;
    if (!cfgId) return;
    try {
      let res = null;
      for (const base of JSON_BASES) {
        try { res = await fetch(`${base}${encodeURIComponent(cfgId)}.json?v=${Date.now()}`); if (res.ok) break; } catch(e){}
      }
      if (res && res.ok) {
        CFG = Object.assign({}, CFG, await res.json());
      }
    } catch (e) { document.getElementById('cfgNote').textContent = '⚠️ Конфиг не найден'; }
  }

  function applyButtonStyle(btn) {
    const size = CFG.ui.btnSize || 5;
    document.documentElement.style.setProperty('--btn-color', CFG.ui.btnColor || "#e74c3c");
    document.documentElement.style.setProperty('--btn-glow', CFG.ui.btnGlow || "#c0392b");

    btn.style.fontSize = `${size}vmin`;
    btn.style.padding = `${size * 0.5}vmin ${size * 2}vmin`;
    btn.style.top = `${CFG.ui.btnY || 80}%`;

    btn.className = 'btn'; 
    if (CFG.ui.btnAnim === 'pulse') btn.classList.add('anim-pulse');
    if (CFG.ui.btnAnim === 'glitch') btn.classList.add('anim-glitch');
  }

  function applyUI() {
    document.getElementById('uiTitle').textContent = CFG.ui.title || "КРЮКОХВАТ";
    document.getElementById('uiTitle').style.display = CFG.ui.hideTitle ? 'none' : 'block';

    const btnStart = document.getElementById('btnStart');
    const btnAgain = document.getElementById('btnAgain');
    btnStart.textContent = CFG.ui.start || "СТАРТ";
    btnAgain.textContent = CFG.ui.again || "ЕЩЁ РАЗ";
    
    applyButtonStyle(btnStart);
    applyButtonStyle(btnAgain);

    const startScreen = document.getElementById('start-screen');
    if (CFG.ui.titleImg && CFG.ui.titleImg.trim() !== "") {
      startScreen.style.background = `url("${CFG.ui.titleImg}") center/cover no-repeat`;
    } else {
      startScreen.style.background = `rgba(10, 10, 10, 0.95)`;
    }

    if (CFG.visual.bgTransparent) {
      document.body.classList.add('transparent-bg');
      document.getElementById('game-app').classList.add('transparent-bg');
    } else {
      document.body.classList.remove('transparent-bg');
      document.getElementById('game-app').classList.remove('transparent-bg');
    }

    if (CFG.visual.hookSound) hookAudio.src = CFG.visual.hookSound;

    // Цвет неоновой бегающей рамки (если не задан, будет бирюзовый)
    let themeGlow = (CFG.visual.qGlow && CFG.visual.qGlow !== "#000000") ? CFG.visual.qGlow : "#00ffcc";
    document.documentElement.style.setProperty('--theme-glow', themeGlow);

    const qbInner = document.querySelector('.q-inner');
    qbInner.style.fontFamily = `"${CFG.visual.fontFamily}", sans-serif`;
    qbInner.style.color = CFG.visual.qColor || "#ffffff";
    qbInner.style.fontSize = (CFG.visual.qSize || 4.5) + "vmin";

    document.getElementById('game-app').style.fontFamily = `"${CFG.visual.fontFamily}", sans-serif`;
  }

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  const imgCache = {};
  
  // Проверка: загружена ли валидная картинка?
  function hasValidImage(val) {
    if (!val || val.trim() === '') return false;
    if (!imgCache[val]) {
      const img = new Image(); 
      img.crossOrigin = "Anonymous";
      img.src = val; 
      imgCache[val] = img;
      return false;
    }
    return imgCache[val].complete && imgCache[val].naturalWidth > 0;
  }

  function renderEntity(val, x, y, size) {
    if (hasValidImage(val)) {
      ctx.drawImage(imgCache[val], x - size/2, y - size/2, size, size);
      return true;
    }
    return false;
  }

  function drawChain(x1, y1, x2, y2, color) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const angle = Math.atan2(dy, dx);
    const linkLength = 18; 
    const numLinks = Math.max(1, Math.floor(dist / linkLength));

    ctx.save();
    ctx.translate(x1, y1);
    ctx.rotate(angle);

    for (let i = 0; i < numLinks; i++) {
      ctx.beginPath();
      ctx.ellipse(i * linkLength + linkLength/2, 0, linkLength/2, 5, 0, 0, Math.PI * 2);
      ctx.strokeStyle = '#111'; ctx.lineWidth = 6; ctx.stroke();

      ctx.beginPath();
      ctx.ellipse(i * linkLength + linkLength/2, 0, linkLength/2, 5, 0, 0, Math.PI * 2);
      ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.stroke();

      ctx.beginPath();
      ctx.ellipse(i * linkLength + linkLength/2 - 1, -1, linkLength/2 - 2, 2, 0, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 1; ctx.stroke();
    }
    ctx.restore();
  }

  const Game = {
    state: 'idle',
    hookState: 'swinging',
    score: 0,
    combo: 1.0,
    currentTaskIndex: 0,
    targets: [],
    hook: { x: 0, y: 0, angle: 0, length: 80, maxLength: 1000, time: 0, caughtTarget: null },

    reset() {
      this.score = 0; this.combo = 1.0; this.currentTaskIndex = 0;
      this.state = 'idle'; this.hookState = 'swinging'; this.hook.length = 80; this.targets = [];
      document.getElementById('start-screen').style.display = 'flex';
      document.getElementById('ui-layer').style.display = 'none';
      document.getElementById('end-screen').style.display = 'none';
      this.draw();
    },

    start() {
      if(!CFG.tasks || CFG.tasks.length === 0) return alert("Нет заданий!");
      this.score = 0; this.combo = 1.0; this.currentTaskIndex = 0;
      this.state = 'playing';
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('ui-layer').style.display = 'flex';
      this.loadTask();
      this.loop();
    },

    spawnFloaty(text, x, y, color, shadowColor) {
      const fc = document.getElementById('floaty-container');
      const el = document.createElement('div');
      el.className = 'floating-text'; el.textContent = text;
      el.style.left = x + 'px'; el.style.top = y + 'px'; el.style.color = color; el.style.textShadow = `0 0 15px ${shadowColor}, 0 2px 4px #000`;
      fc.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    },

    loadTask() {
      if (this.currentTaskIndex >= CFG.tasks.length) return this.gameOver();
      
      const task = CFG.tasks[this.currentTaskIndex];
      document.getElementById('question-text').textContent = task.q;
      const pct = (this.currentTaskIndex / CFG.tasks.length) * 100;
      document.getElementById('progress-fill').style.width = `${pct}%`;
      document.getElementById('score-display').textContent = this.score;
      document.getElementById('combo-display').textContent = this.combo.toFixed(1);

      this.targets = [];
      let allAnswers = [ { text: task.correct[0] || "Да", isCorrect: true } ];
      (task.wrong || []).forEach(w => { if(w.trim()) allAnswers.push({ text: w.trim(), isCorrect: false }); });
      allAnswers.sort(() => Math.random() - 0.5);

      const assetsList = (CFG.visual.targets && CFG.visual.targets.length > 0) ? [...CFG.visual.targets] : [""];
      
      const targetW = CFG.visual.targetSize || 90;
      
      // ИДЕАЛЬНАЯ СЕТКА: 2 колонки максимум
      const maxCols = 2; 
      const rows = [];
      for(let i=0; i<allAnswers.length; i+=maxCols) {
          rows.push(allAnswers.slice(i, i+maxCols));
      }
      
      // Стартуем СТРОГО ниже плашки вопроса (25% высоты или 180px)
      const startY = Math.max(180, canvas.height * 0.25);
      const rowHeight = targetW + 80; 
      
      let answerIndex = 0;
      rows.forEach((rowItems, r) => {
          const zoneWidth = canvas.width / rowItems.length;
          rowItems.forEach((ans, c) => {
              const minX = c * zoneWidth + targetW/2 + 20;
              const maxX = (c + 1) * zoneWidth - targetW/2 - 20;
              
              this.targets.push({
                 text: ans.text,
                 isCorrect: ans.isCorrect,
                 asset: assetsList[answerIndex % assetsList.length],
                 minX: minX,
                 maxX: Math.max(minX, maxX),
                 x: minX + Math.random() * Math.max(0, maxX - minX),
                 y: startY + (r * rowHeight),
                 w: targetW, h: targetW,
                 hitX: 0, hitY: 0, hitW: 0, hitH: 0, // Вычисляются в draw
                 speed: (Math.random() * 1.5 + 1.0) * (c % 2 === 0 ? 1 : -1)
              });
              answerIndex++;
          });
      });

      this.hookState = 'swinging'; this.hook.length = 80;
    },

    shoot() {
      if (this.state === 'playing' && this.hookState === 'swinging') {
        this.hookState = 'shooting';
        this.hook.maxLength = canvas.height * 1.2;
        
        if (CFG.visual.hookSound) {
            hookAudio.currentTime = 0;
            hookAudio.play().catch(e => console.log('Audio error:', e));
        }
      }
    },

    update() {
      if (this.state !== 'playing') return;

      const speed = CFG.gameplay.hookSpeed || 10;
      const swingSpeed = CFG.gameplay.swingSpeed || 0.035;
      
      this.hook.x = canvas.width / 2;
      this.hook.y = canvas.height - (CFG.visual.heroSize || 150)/2 + (CFG.visual.hookOffsetY || 0);

      this.targets.forEach(t => {
        // Движение ТОЛЬКО по горизонтали
        t.x += t.speed;
        if (t.x > t.maxX) { t.x = t.maxX; t.speed *= -1; }
        if (t.x < t.minX) { t.x = t.minX; t.speed *= -1; }
      });

      if (this.hookState === 'swinging') {
        this.hook.time += swingSpeed;
        this.hook.angle = Math.sin(this.hook.time) * (Math.PI / 2.2);
      } 
      else if (this.hookState === 'shooting') {
        this.hook.length += speed;
        const hx = this.hook.x + Math.sin(this.hook.angle) * this.hook.length;
        const hy = this.hook.y - Math.cos(this.hook.angle) * this.hook.length;

        for (let i = 0; i < this.targets.length; i++) {
          let t = this.targets[i];
          // Идеальная проверка столкновений по реальной коробке (картинке ИЛИ тексту)
          if (Math.abs(hx - t.hitX) < t.hitW/2 && Math.abs(hy - t.hitY) < t.hitH/2) {
            this.hookState = 'retracting';
            this.hook.caughtTarget = t; 
            this.targets.splice(i, 1); 
            break;
          }
        }
        if (this.hook.length > this.hook.maxLength) {
           this.hookState = 'retracting';
           this.combo = 1.0; 
           document.getElementById('combo-display').textContent = this.combo.toFixed(1);
        }
      } 
      else if (this.hookState === 'retracting') {
        this.hook.length -= speed * 1.5; 
        
        if (this.hook.caughtTarget) {
          this.hook.caughtTarget.x = this.hook.x + Math.sin(this.hook.angle) * this.hook.length;
          this.hook.caughtTarget.y = this.hook.y - Math.cos(this.hook.angle) * this.hook.length;
        }

        if (this.hook.length <= 80) {
          this.hookState = 'swinging'; 
          this.hook.length = 80;
          
          if (this.hook.caughtTarget) {
            let caught = this.hook.caughtTarget;
            this.hook.caughtTarget = null;
            
            if (caught.isCorrect) {
              let pts = Math.floor(100 * this.combo);
              this.score += pts;
              this.spawnFloaty(`+${pts}`, this.hook.x, this.hook.y - 120, '#00ffcc', '#00ffcc');
              if(this.combo > 1.0) this.spawnFloaty(`x${this.combo.toFixed(1)}`, this.hook.x + 40, this.hook.y - 90, '#f1c40f', '#f39c12');
              
              this.combo = Math.min(this.combo + 0.5, 5.0);
              
              confetti({ particleCount: 100, spread: 70, origin: { y: 0.9 }, colors: [CFG.visual.ropeColor, '#f1c40f', '#00ffcc'] });
              this.currentTaskIndex++;
              setTimeout(() => this.loadTask(), 800);
            } else {
              this.combo = 1.0;
              document.getElementById('combo-display').textContent = this.combo.toFixed(1);
              this.spawnFloaty("ПРОМАХ!", this.hook.x, this.hook.y - 120, '#e74c3c', '#c0392b');
              document.getElementById('question-text').textContent = "Не то!";
              
              this.targets.push(caught);
              setTimeout(() => this.loadTask(), 1200);
            }
          }
        }
      }
    },

    drawTargetEl(t) {
        const hasImg = hasValidImage(t.asset);

        ctx.font = `bold ${CFG.visual.tSize || 22}px "${CFG.visual.fontFamily}", sans-serif`;
        const textMet = ctx.measureText(t.text);
        const paddingX = 30;
        const tw = Math.max(textMet.width + paddingX, 60);
        const th = (CFG.visual.tSize || 22) + 16;
        
        let textY;

        if (hasImg) {
          // Если есть картинка: рисуем ее, а текст НАД ней
          renderEntity(t.asset, t.x, t.y, t.w);
          textY = t.y - t.h/2 - th/2 - 5;
          
          // Хитбокс - это сама картинка
          t.hitX = t.x; t.hitY = t.y; t.hitW = t.w; t.hitH = t.h;
        } else {
          // Если картинки НЕТ: текст центрируется
          textY = t.y;
          
          // Хитбокс - это плашка текста
          t.hitX = t.x; t.hitY = textY; t.hitW = tw; t.hitH = th;
        }

        // Рисуем стеклянную плашку ответа
        ctx.fillStyle = 'rgba(15, 20, 25, 0.9)';
        ctx.beginPath(); ctx.roundRect(t.x - tw/2, textY - th/2, tw, th, 15); ctx.fill();
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)'; ctx.lineWidth = 2; ctx.stroke();
        
        // Цветная обводка плашки
        let themeGlow = (CFG.visual.qGlow && CFG.visual.qGlow !== "#000000") ? CFG.visual.qGlow : "rgba(0, 255, 204, 0.5)";
        ctx.strokeStyle = themeGlow; ctx.lineWidth = 1; ctx.stroke(); 

        ctx.fillStyle = CFG.visual.tColor || '#ffffff';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(t.text, t.x, textY);
    },

    draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      this.targets.forEach(t => this.drawTargetEl(t));
      if (this.hook.caughtTarget) this.drawTargetEl(this.hook.caughtTarget);

      this.hook.x = canvas.width / 2;
      this.hook.y = canvas.height - (CFG.visual.heroSize || 150)/2 + (CFG.visual.hookOffsetY || 0);
      const hx = this.hook.x + Math.sin(this.hook.angle) * this.hook.length;
      const hy = this.hook.y - Math.cos(this.hook.angle) * this.hook.length;

      drawChain(this.hook.x, this.hook.y, hx, hy, CFG.visual.ropeColor || "#bdc3c7");
      renderEntity(CFG.visual.hook || "hook.png", hx, hy, CFG.visual.hookSize || 60);

      const heroX = (canvas.width / 2) + (CFG.visual.heroX || 0);
      const heroY = canvas.height - (CFG.visual.heroSize || 150)/2; 
      renderEntity(CFG.visual.hero || "hero.png", heroX, heroY, CFG.visual.heroSize || 150);
    },

    loop() {
      if (this.state !== 'playing') return;
      this.update(); this.draw();
      requestAnimationFrame(() => this.loop());
    },

    gameOver() {
      this.state = 'gameover';
      document.getElementById('ui-layer').style.display = 'none';
      document.getElementById('end-screen').style.display = 'flex';
      document.getElementById('end-title').textContent = CFG.ui.win || "КВИЗ ПРОЙДЕН!";
      document.getElementById('end-score').textContent = this.score;
      confetti({ particleCount: 250, spread: 120, origin: { y: 0.5 }, colors: [CFG.visual.ropeColor, '#f1c40f', '#00ffcc'] });
    }
  };

  window.addEventListener('keydown', (e) => { if (e.code === 'Space') Game.shoot(); });
  canvas.addEventListener('mousedown', () => Game.shoot());
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); Game.shoot(); }, {passive: false});

  function playHookSoundAndStart() {
    if (CFG.visual.hookSound) {
        hookAudio.currentTime = 0;
        hookAudio.play().catch(e => console.log('Audio start error:', e));
    }
    Game.start();
  }

  document.getElementById('btnStart').onclick = playHookSoundAndStart;
  document.getElementById('btnAgain').onclick = playHookSoundAndStart;

  (async function init() {
    await loadConfig();
    applyUI();
    Game.reset();
  })();
</script>
</body>
