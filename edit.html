<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Редактор квиза - Quiz Miner</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f8;
      display: flex;
      justify-content: center;
      padding-top: 50px;
    }
    .editor-container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 400px;
    }
    h2 { margin-top: 0; color: #2c3e50; text-align: center; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
    input[type="text"], select {
      width: 100%;
      padding: 10px;
      border: 1px solid #bdc3c7;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 14px;
    }
    .answers-inputs input { margin-bottom: 8px; }
    button {
      width: 100%;
      padding: 12px;
      background-color: #2ecc71;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background-color: #27ae60; }
  </style>
</head>
<body>

  <div class="editor-container">
    <h2>Создать вопрос</h2>
    <form id="quiz-form">
      <div class="form-group">
        <label for="question-input">Текст вопроса:</label>
        <input type="text" id="question-input" placeholder="Например: Сколько будет 2 + 2?" required>
      </div>

      <div class="form-group answers-inputs">
        <label>Варианты ответа (мишени):</label>
        <input type="text" id="answer-1" placeholder="Вариант 1 (Индекс 0)" required>
        <input type="text" id="answer-2" placeholder="Вариант 2 (Индекс 1)" required>
        <input type="text" id="answer-3" placeholder="Вариант 3 (Индекс 2)" required>
        <input type="text" id="answer-4" placeholder="Вариант 4 (Индекс 3)" required>
      </div>

      <div class="form-group">
        <label for="correct-select">Какой ответ правильный?</label>
        <select id="correct-select">
          <option value="0">Вариант 1</option>
          <option value="1">Вариант 2</option>
          <option value="2">Вариант 3</option>
          <option value="3">Вариант 4</option>
        </select>
      </div>

      <button type="button" id="save-quiz-btn">Сохранить на сервер</button>
    </form>
  </div>

  <script src="editor.js"></script>

</body>
</html>
